<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Formulario de Registro</h1>
        
        <form id="registroForm" novalidate>
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Victor Pérez" required>
                <span class="error-msg" id="error-nombre"></span>
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" placeholder="usuario@correo.com" required>
                <span class="error-msg" id="error-correo"></span>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" placeholder="987654321" required>
                <span class="error-msg" id="error-telefono"></span>
            </div>

            <div class="form-group">
                <label for="curso">Curso de Interés</label>
                <select id="curso">
                    <option value="Fullstack">Fullstack</option>
                    <option value="Frontend">Frontend</option>
                    <option value="Backend">Backend</option>
                    <option value="Mobile">Desarrollo Mobile</option>
                </select>
            </div>

            <button type="submit" id="btnRegistrar">Registrar Estudiante</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
